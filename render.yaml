services:
  # ─── Backend (NestJS API) ────────────────────────────────────────
  - type: web
    name: sportnexus-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false          # lo pegas manualmente en el dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false          # lo agregas después con la URL del frontend
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH0_DOMAIN
        value: dev-6d0mok1v1ohx5iez.us.auth0.com
      - key: AUTH0_AUDIENCE
        value: https://sportnexus-api

  # ─── Frontend (React/Vite) — Static Site (100% gratis, sin sleep) ─
  - type: web
    name: sportnexus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # lo agregas con la URL del backend de Render
